version: '3.9'

volumes:
  redis_data: {}
  app_data: {}
  nginx_cfg: {}
  nginx_certs: {}
  grafana_data: {}
  influxdb-data: {}
  prometheus_cfg:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: 'prometheus'

networks:
  wissance_ferrum_eth:
    driver: bridge
    ipam:
      config:
        - gateway: 10.50.40.1
          subnet: 10.50.40.0/24

services:
  redis:
    container_name: wissance_ferrum_db
    networks:
      wissance_ferrum_eth:
        ipv4_address: 10.50.40.2
    hostname: redis
    image: "redis/redis-stack:7.2.0-v2"
    env_file:
      - .env
    restart: always
    volumes:
      - redis_data:/data
    environment:
      REDIS_ARGS: ${REDIS_ARGS}
    ports:
      - "6379:6379"
      - "8001:8001"
    expose:
      - "6379"
      - "8001"

  ferrum:
    container_name: wissance_ferrum_webapi
    networks:
      wissance_ferrum_eth:
        ipv4_address: 10.50.40.3
        aliases:
          - ferrum.dev.local
    hostname: ferrum
    stdin_open: true
    tty: true
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - app_data:/data
      - nginx_cfg:/nginx_cfg
    environment:
      VIRTUAL_HOST: ferrum.dev.local
      WAIT_HOSTS: redis:6379
      FERRUM_DATA_INIT_SCRIPT: "r100_u100_demo_data.sh"
    depends_on:
      redis:
        condition: service_started
    ports:
      - "8182:8182"
    expose:
      - "8182"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://10.50.40.3:8182/swagger/index.html" ]
      interval: 10m
      timeout: 5s
      retries: 60
      start_period: 30s # Initial delay for startup

  nginx-proxy:
    container_name: wissance_reverse_proxy
    image: nginxproxy/nginx-proxy
    networks:
      wissance_ferrum_eth:
        ipv4_address: 10.50.40.4
    ports:
      - '80:80'
    extra_hosts:
      - ferrum.dev.local:10.50.40.3
    depends_on:
      - ferrum
    volumes:
      - nginx_cfg:/etc/nginx/
      - nginx_certs:/etc/ssl/certs
      - '/var/run/docker.sock:/tmp/docker.sock:ro'
  prometheus:
    image: prom/prometheus:latest
    container_name: wissance_ferrum_prometheus
    depends_on:
      ferrum:
        condition: service_started
    volumes:
      - prometheus_cfg:/etc/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      wissance_ferrum_eth:
        ipv4_address: 10.50.40.10
        aliases:
          - prometheus.dev.local
    hostname: prometheus

  grafana:
    image: grafana/grafana-oss:latest
    container_name: wissance_ferrum_grafana
    volumes:
      # This maps the internal Grafana data directory to a named Docker volume
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    networks:
      wissance_ferrum_eth:
        ipv4_address: 10.50.40.11
        aliases:
          - grafana.dev.local
    hostname: grafana
    depends_on:
      - prometheus
  influxdb:
    container_name: wissance_ferrum_influxdb
    image: influxdb:1.12
    hostname: influxdb
    networks:
      wissance_ferrum_eth:
        ipv4_address: 10.50.40.12
        aliases:
          - influxdb.dev.local
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_ADMIN_ENABLED=true
      - INFLUXDB_HTTP_AUTH_ENABLED=true
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=admin123456
      - INFLUXDB_USER=ferrum
      - INFLUXDB_USER_PASSWORD=1234567890
      # v2 , not working with K6
      #- DOCKER_INFLUXDB_INIT_MODE=setup
      #- DOCKER_INFLUXDB_INIT_USERNAME=admin
      #- DOCKER_INFLUXDB_INIT_PASSWORD=admin123456
      #- DOCKER_INFLUXDB_INIT_ORG=wissance
      #- DOCKER_INFLUXDB_INIT_BUCKET=ferrum
      #- DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=$ecRet
  k6:
    image: grafana/k6:latest
    container_name: wissance_ferrum_k6
    # command: run /k6_smoke_test.js
    command: run /k6_average_load_test.js
    networks:
      wissance_ferrum_eth:
        ipv4_address: 10.50.40.20
        aliases:
          - influxdb.dev.local
    ports:
      - "6565:6565"
    environment:
      - K6_INFLUXDB_USERNAME=admin
      - K6_INFLUXDB_PASSWORD=admin123456
      - K6_INFLUXDB_ORGANIZATION=wissance
      - K6_INFLUXDB_BUCKET=ferrum
      - K6_INFLUXDB_TOKEN=SecRet
      - K6_OUT=influxdb=http://influxdb:8086/k6
      #- K6_OUT=influxdb=http://admin:admin123456@influxdb:8086/k6
    volumes:
      #- ./tools/k6_smoke_test.js:/k6_smoke_test.js
      - ./tools/k6_average_load_test.js:/k6_average_load_test.js
    depends_on:
      influxdb:
        condition: service_started
      ferrum:
        condition: service_started